{% extends "base.html" %}
{% block title %}加入班级{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><i class="fas fa-door-open"></i> 加入班级</div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">邀请码</label>
                        <input type="text" name="invite_code" class="form-control text-center" 
                               style="font-size:1.5rem; letter-spacing: 4px; text-transform: uppercase;"
                               required placeholder="输入教师提供的邀请码" maxlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">加入</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
