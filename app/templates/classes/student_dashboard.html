{% extends "base.html" %}
{% block title %}我的班级 - Python Judge{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        {% if class_ %}
        <div class="card text-center">
            <div class="card-header"><i class="fas fa-school"></i> 我的班级</div>
            <div class="card-body">
                <h4>{{ class_.name }}</h4>
                <p class="text-muted">教师: {{ class_.teacher.real_name or class_.teacher.username }}</p>
                <a href="{{ url_for('classes.detail', class_id=class_.id) }}" class="btn btn-primary">
                    <i class="fas fa-eye"></i> 查看班级
                </a>
            </div>
        </div>
        {% else %}
        <div class="card text-center">
            <div class="card-header"><i class="fas fa-users"></i> 加入班级</div>
            <div class="card-body">
                <p class="text-muted">你还没有加入任何班级</p>
                <a href="{{ url_for('classes.join') }}" class="btn btn-primary">
                    <i class="fas fa-door-open"></i> 加入班级
                </a>
            </div>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
