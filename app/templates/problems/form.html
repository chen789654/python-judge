{% extends "base.html" %}
{% block title %}{% if problem %}编辑{% else %}创建{% endif %}题目{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-{% if problem %}edit{% else %}plus{% endif %}"></i>
                    {% if problem %}编辑{% else %}创建{% endif %}题目</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">标题 *</label>
                        <input type="text" name="title" class="form-control" required
                               value="{{ problem.title if problem else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">题目描述 * (支持Markdown)</label>
                        <textarea name="description" class="form-control" rows="10" required>{{ problem.description if problem else '' }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">输入描述</label>
                            <textarea name="input_description" class="form-control" rows="3">{{ problem.input_description if problem else '' }}</textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">输出描述</label>
                            <textarea name="output_description" class="form-control" rows="3">{{ problem.output_description if problem else '' }}</textarea>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">示例输入</label>
                            <textarea name="sample_input" class="form-control code-editor" rows="4">{{ problem.sample_input if problem else '' }}</textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">示例输出</label>
                            <textarea name="sample_output" class="form-control code-editor" rows="4">{{ problem.sample_output if problem else '' }}</textarea>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">难度</label>
                            <select name="difficulty" class="form-select">
                                <option value="easy" {% if problem and problem.difficulty == 'easy' %}selected{% endif %}>简单</option>
                                <option value="medium" {% if problem and problem.difficulty == 'medium' %}selected{% endif %}>中等</option>
                                <option value="hard" {% if problem and problem.difficulty == 'hard' %}selected{% endif %}>困难</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">标签 (逗号分隔)</label>
                            <input type="text" name="tags" class="form-control" placeholder="列表, 字典, 函数"
                                   value="{{ problem.tags if problem else '' }}">
                        </div>
                        <div class="col-md-4 mb-3 d-flex align-items-end">
                            <div class="form-check">
                                <input type="checkbox" name="visible" class="form-check-input" id="visibleCheck"
                                       {% if problem and problem.visible %}checked{% endif %}>
                                <label class="form-check-label" for="visibleCheck">对学生可见</label>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('problems.list') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">
                            {% if problem %}保存修改{% else %}创建题目{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
